<!DOCTYPE html>
<html>
<body>
  <div id="result"></div>

  <script>
    function sumOfDigits(num){
        let sum = 0;
        while(num > 0){
            sum += num % 10;
            num = Math.floor(num / 10);
        }
        document.getElementById("result").innerHTML = "Result: " + sum;
        return sum;
    }

    sumOfDigits(1287); // Auto show on page
  </script>
</body>
</html>
